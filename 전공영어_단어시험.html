<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전공영어 단어시험 | Chapter 4 MLR</title>
<style>
  :root {
    --primary: #4f46e5;
    --primary-dark: #3730a3;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  .container { width: 100%; max-width: 680px; }

  /* HEADER */
  header {
    text-align: center;
    padding: 28px 0 20px;
  }
  header h1 { font-size: 1.6rem; color: var(--primary); }
  header p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

  /* SCREEN */
  .screen { display: none; }
  .screen.active { display: block; }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }

  /* MODE SELECT */
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 16px 0;
  }
  .mode-btn {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
    cursor: pointer;
    background: white;
    text-align: center;
    transition: all .15s;
  }
  .mode-btn:hover { border-color: var(--primary); background: #f0f0ff; }
  .mode-btn.selected { border-color: var(--primary); background: #ede9fe; }
  .mode-btn .emoji { font-size: 1.6rem; display: block; margin-bottom: 6px; }
  .mode-btn .label { font-weight: 600; font-size: 0.95rem; }
  .mode-btn .sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  .order-row {
    display: flex;
    gap: 10px;
    margin: 14px 0;
  }
  .order-btn {
    flex: 1;
    padding: 10px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    background: white;
    font-size: 0.9rem;
    transition: all .15s;
  }
  .order-btn.selected { border-color: var(--primary); background: #ede9fe; font-weight: 600; }

  .start-btn {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
    margin-top: 6px;
  }
  .start-btn:hover { background: var(--primary-dark); }

  /* QUIZ SCREEN */
  .progress-bar-wrap {
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    margin-bottom: 18px;
  }
  .progress-bar {
    height: 100%;
    border-radius: 99px;
    background: var(--primary);
    transition: width .3s;
  }
  .progress-label {
    font-size: 0.82rem;
    color: var(--muted);
    text-align: right;
    margin-bottom: 4px;
  }
  .freq-badge {
    display: inline-block;
    background: #f1f5f9;
    color: var(--muted);
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 99px;
    margin-bottom: 12px;
  }
  .word-display {
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--primary);
    margin: 10px 0 22px;
    letter-spacing: -0.5px;
  }
  .answer-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 1.1rem;
    outline: none;
    transition: border-color .15s;
  }
  .answer-input:focus { border-color: var(--primary); }
  .answer-input.correct { border-color: var(--success); background: #f0fdf4; }
  .answer-input.wrong   { border-color: var(--danger);  background: #fef2f2; }

  .feedback {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.95rem;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; display: block; }
  .feedback.wrong   { background: #fee2e2; color: #991b1b; display: block; }
  .feedback .full-meaning { margin-top: 4px; font-size: 0.85rem; opacity: .8; }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 0.95rem;
    cursor: pointer;
    font-weight: 600;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-skip    { background: #f1f5f9; color: var(--muted); }
  .btn-hint    { background: #fef3c7; color: #92400e; }

  /* RESULT */
  .score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 8px solid var(--primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .score-pct { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
  .score-sub { font-size: 0.78rem; color: var(--muted); }
  .result-msg { text-align: center; font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }

  .wrong-list { margin-top: 10px; }
  .wrong-list h3 { font-size: 0.9rem; color: var(--muted); margin-bottom: 10px; }
  .wrong-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: #fef2f2;
  }
  .wrong-word { font-weight: 700; color: var(--danger); font-size: 1rem; }
  .wrong-meaning { font-size: 0.88rem; color: #7f1d1d; }

  .result-btns { display: flex; gap: 10px; margin-top: 20px; }

  /* RESPONSIVE */
  @media(max-width:480px){
    .mode-grid { grid-template-columns: 1fr; }
    .word-display { font-size: 1.8rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>전공영어 단어시험</h1>
    <p>Chapter 4 · Multiple Linear Regression</p>
  </header>

  <!-- MODE SELECT SCREEN -->
  <div id="screen-mode" class="screen active">
    <div class="card">
      <b>시험 범위 선택</b>
      <div class="mode-grid" id="mode-grid">
        <div class="mode-btn selected" data-mode="30" onclick="selectMode(this)">
          <span class="emoji">⭐</span>
          <span class="label">핵심 30개</span>
          <span class="sub">빈도 상위 단어</span>
        </div>
        <div class="mode-btn" data-mode="60" onclick="selectMode(this)">
          <span class="emoji">📚</span>
          <span class="label">중급 60개</span>
          <span class="sub">빈도 상위 단어</span>
        </div>
        <div class="mode-btn" data-mode="all" onclick="selectMode(this)">
          <span class="emoji">💪</span>
          <span class="label">전체 121개</span>
          <span class="sub">모든 어휘</span>
        </div>
        <div class="mode-btn" data-mode="terms" onclick="selectMode(this)">
          <span class="emoji">🔬</span>
          <span class="label">전문용어</span>
          <span class="sub">통계 용어 36개</span>
        </div>
      </div>

      <b>출제 순서</b>
      <div class="order-row">
        <button class="order-btn" data-order="freq" onclick="selectOrder(this)">빈도순</button>
        <button class="order-btn selected" data-order="random" onclick="selectOrder(this)">랜덤 🎲</button>
      </div>

      <button class="start-btn" onclick="startQuiz()">시험 시작 →</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <div class="card">
      <div class="progress-label" id="progress-label">1 / 30</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="freq-badge" id="freq-badge">빈도: -</div>
      <div class="word-display" id="word-display">regression</div>
      <input type="text" class="answer-input" id="answer-input"
             placeholder="한국어 뜻을 입력하세요"
             onkeydown="if(event.key==='Enter') submitAnswer()"
             autocomplete="off">
      <div class="feedback" id="feedback"></div>
      <div class="btn-row">
        <button class="btn btn-hint" onclick="showHint()">힌트</button>
        <button class="btn btn-skip" onclick="skipWord()">건너뛰기</button>
        <button class="btn btn-primary" id="next-btn" onclick="nextWord()" style="display:none">다음 →</button>
        <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()">확인</button>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen">
    <div class="card" style="text-align:center">
      <div class="score-circle">
        <span class="score-pct" id="score-pct">0%</span>
        <span class="score-sub" id="score-frac">0/0</span>
      </div>
      <div class="result-msg" id="result-msg"></div>
      <div class="result-btns">
        <button class="btn btn-skip" onclick="showMode()">처음으로</button>
        <button class="btn btn-primary" id="retry-btn" onclick="retryWrong()">틀린 것만 재시험</button>
      </div>
    </div>
    <div class="card wrong-list" id="wrong-card" style="display:none">
      <h3>틀린 단어 목록</h3>
      <div id="wrong-list-body"></div>
    </div>
  </div>
</div>

// ============================================================
// 상태 변수
// ============================================================
let pool = [];
let current = 0;
let correctCount = 0;
let wrongItems = [];
let answered = false;
let selectedMode = '30';
let selectedOrder = 'random';

// ============================================================
// 모드 선택
// ============================================================
function selectMode(el) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedMode = el.dataset.mode;
}
function selectOrder(el) {
  document.querySelectorAll('.order-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedOrder = el.dataset.order;
}

function buildPool() {
  let base;
  if (selectedMode === '30') base = VOCAB.slice(0, 30);
  else if (selectedMode === '60') base = VOCAB.slice(0, 60);
  else if (selectedMode === 'all') base = [...VOCAB];
  else base = [...TERMS];

  if (selectedOrder === 'random') {
    base = base.slice().sort(() => Math.random() - 0.5);
  }
  return base;
}

function startQuiz() {
  pool = buildPool();
  current = 0;
  correctCount = 0;
  wrongItems = [];
  showScreen('quiz');
  loadQuestion();
}

// ============================================================
// 퀴즈 로직
// ============================================================
function loadQuestion() {
  answered = false;
  const item = pool[current];
  const pct = (current / pool.length * 100).toFixed(0);

  document.getElementById('progress-label').textContent = `${current + 1} / ${pool.length}`;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('freq-badge').textContent = item.f === '-' ? '전문용어' : `빈도: ${item.f}`;
  document.getElementById('word-display').textContent = item.w;

  const input = document.getElementById('answer-input');
  input.value = '';
  input.className = 'answer-input';
  input.disabled = false;
  input.focus();

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('submit-btn').style.display = 'block';
  document.getElementById('next-btn').style.display = 'none';
}

function submitAnswer() {
  if (answered) { nextWord(); return; }
  const item = pool[current];
  const userAns = document.getElementById('answer-input').value.trim();
  if (!userAns) return;

  answered = true;
  const ok = checkAnswer(userAns, item);
  const input = document.getElementById('answer-input');
  input.disabled = true;
  input.className = 'answer-input ' + (ok ? 'correct' : 'wrong');

  const fb = document.getElementById('feedback');
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '✔ 정답!';
    correctCount++;
  } else {
    fb.className = 'feedback wrong';
    fb.innerHTML = `✘ 오답 &nbsp;|&nbsp; 정답: <strong>${item.m}</strong>
      <div class="full-meaning">${item.mf}</div>`;
    wrongItems.push(item);
  }

  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = 'block';
}

function checkAnswer(userAns, item) {
  const krWords = item.mf.match(/[가-힣]+/g) || [];
  const userKr = userAns.match(/[가-힣]+/g) || [];
  const userStr = userKr.join('');
  for (const kw of krWords) {
    if (kw.length >= 2 && userStr.includes(kw)) return true;
  }
  // 영어 약어 허용 (SSE, ANOVA 등)
  const lower = userAns.toLowerCase().trim();
  const wordLower = item.w.toLowerCase().trim();
  if (lower === wordLower) return false;
  return false;
}

function showHint() {
  if (answered) return;
  const m = pool[current].m;
  const hint = m[0] + m.slice(1).replace(/[가-힣]/g, '○');
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.style.display = 'block';
  fb.style.background = '#fef3c7';
  fb.style.color = '#92400e';
  fb.innerHTML = `힌트: ${hint}`;
}

function skipWord() {
  if (answered) return;
  const item = pool[current];
  wrongItems.push(item);
  const fb = document.getElementById('feedback');
  fb.className = 'feedback wrong';
  fb.innerHTML = `건너뜀  |  정답: <strong>${item.m}</strong>`;
  document.getElementById('answer-input').disabled = true;
  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = 'block';
  answered = true;
}

function nextWord() {
  current++;
  if (current >= pool.length) {
    showResult();
  } else {
    loadQuestion();
  }
}

// ============================================================
// 결과 화면
// ============================================================
function showResult() {
  const total = pool.length;
  const pct = total > 0 ? Math.round(correctCount / total * 100) : 0;

  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-frac').textContent = `${correctCount} / ${total}`;

  const msgs = [
    [100, '완벽합니다! 만점! 🎉'],
    [90,  '거의 다 맞혔어요! 👏'],
    [80,  '잘 했어요! 조금만 더! 👍'],
    [60,  '절반 이상! 복습이 필요해요. 📖'],
    [0,   '틀린 단어를 다시 공부해봐요. 💪'],
  ];
  for (const [threshold, msg] of msgs) {
    if (pct >= threshold) { document.getElementById('result-msg').textContent = msg; break; }
  }

  const retryBtn = document.getElementById('retry-btn');
  retryBtn.style.display = wrongItems.length > 0 ? 'block' : 'none';

  const wrongCard = document.getElementById('wrong-card');
  const wrongBody = document.getElementById('wrong-list-body');
  wrongBody.innerHTML = '';
  if (wrongItems.length > 0) {
    wrongCard.style.display = 'block';
    wrongItems.forEach(item => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `<span class="wrong-word">${item.w}</span><span class="wrong-meaning">${item.m}</span>`;
      wrongBody.appendChild(div);
    });
  } else {
    wrongCard.style.display = 'none';
  }

  showScreen('result');
}

function retryWrong() {
  if (wrongItems.length === 0) return;
  pool = wrongItems.slice().sort(() => Math.random() - 0.5);
  current = 0;
  correctCount = 0;
  wrongItems = [];
  showScreen('quiz');
  loadQuestion();
}

function showMode() {
  showScreen('mode');
}

// ============================================================
// 화면 전환
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// 초기 모드 버튼 상태 설정
document.querySelector('[data-order="random"]').classList.add('selected');
</script>
</body>
</html>
